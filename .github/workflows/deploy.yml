name: Deploy NuGet Package

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Delete published version (if any)
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        V=$(grep -oP '(?<=<Version>)[^<]+' lib/lib.csproj|head -1); O=${{ github.repository_owner }}; P=${{ github.event.repository.name }}
        J=$(gh api "/users/$O/packages/nuget/$P/versions" --paginate 2>/dev/null || gh api "/orgs/$O/packages/nuget/$P/versions" --paginate 2>/dev/null || echo "[]")
        ID=$(echo "$J"|jq -r --arg v "$V" --arg n "${V%.0}" '.[]|select(.name==$v or .name==$n)|.id'|head -1)
        [ -n "$ID" ] && { gh api -X DELETE "/users/$O/packages/nuget/$P/versions/$ID" || gh api -X DELETE "/orgs/$O/packages/nuget/$P/versions/$ID"; } || true

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code style
      run: dotnet format --verify-no-changes --verbosity diagnostic --severity error

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test
      run: dotnet test

    - name: Pack
      run: dotnet pack -c Release --no-build --output ./artifacts

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }}
